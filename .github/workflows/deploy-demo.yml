name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'demo/**'
      - 'README*.md'
      - '.github/workflows/deploy-demo.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build plugin
        run: pnpm build

      - name: Build demo
        run: pnpm demo:build
        env:
          NODE_ENV: production

      - name: Create site structure
        run: |
          mkdir -p ./_site/demo
          cp -r ./demo/.vitepress/dist/* ./_site/demo/
          cp README*.md ./_site/
          cp *.svg ./_site/ 2>/dev/null || true
          cat > ./_site/_config.yml << 'EOF'
          theme: jekyll-theme-primer
          plugins:
            - jekyll-readme-index
          readme_index:
            enabled: true
            forward_to: /
          keep_files:
            - demo
          EOF

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          keep_files: false
          disable_nojekyll: true
